<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Momentum</title>

    <!-- PWA / iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Momentum" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#0F0F0F" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <script>
      // Prevent iOS auto-zoom on input/textarea focus by locking maximum-scale while focused
      (function () {
        var vp = document.querySelector('meta[name=viewport]');
        if (!vp) return;
        var base = vp.getAttribute('content');
        document.addEventListener('focus', function (e) {
          if (e.target.matches('input, textarea, select')) {
            vp.setAttribute('content', base + ', maximum-scale=1.0');
          }
        }, true);
        document.addEventListener('blur', function (e) {
          if (e.target.matches('input, textarea, select')) {
            setTimeout(function () { vp.setAttribute('content', base); }, 100);
          }
        }, true);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
